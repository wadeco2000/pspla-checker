name: Publish to GitHub Pages

on:
  schedule:
    - cron: '0 11 * * *'   # Daily at 11:00 UTC = midnight NZ time
  workflow_dispatch:         # Manual trigger (from dashboard Publish button or GitHub UI)

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Install staticrypt
        run: npm install -g staticrypt

      - name: Generate static HTML
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PAGES_PASSWORD: ${{ secrets.PAGES_PASSWORD }}
        run: python generate_static.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4a2e02b36f31d8974a0d09d3bb9f3172aa2d0d0d  # v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          commit_message: "Update static dashboard [skip ci]"
